[book]
title = "Building Discovery AI: From Vibe Coding to Autonomous Science"
subtitle = "A practitioner's guide to AI-driven scientific discovery, from prompt engineering through autonomous lab systems"
language = "en"
identifier = "urn:uuid:4b74983b-b2ed-5ab9-915a-0c12b724c9eb"
publisher = "Apartsin & Aperstein"
rights = "Copyright (c) 2026 Alexander Apartsin. All rights reserved."
publication_date = "2026-07-14"
description = """Across 58 chapters and seven parts, Building Discovery AI traces the full arc from foundations of search and reasoning through software engineering with AI agents, data and model pipelines, knowledge systems, simulation and optimization, domain-specific scientific applications, and finally autonomous discovery systems. Each chapter combines rigorous theory with production-ready code, hands-on labs, and real-world case studies."""
keywords = [
    "AI scientific discovery",
    "vibe coding",
    "autonomous science",
    "LLM agents",
    "knowledge graphs",
    "Bayesian optimization",
    "causal inference",
    "drug discovery AI",
    "materials science ML",
    "self-driving labs",
    "RAG retrieval augmented generation",
    "MCP model context protocol",
    "experiment design",
    "simulation optimization",
    "AI safety governance",
]

[[book.authors]]
name = "Alexander Apartsin"
file_as = "Apartsin, Alexander"
role = "aut"

[content]
source_dir = "."
spine = "auto"
front_matter_dir = "front-matter"
parts_glob = "part-*"
module_glob = "module-*"
section_glob = "section-*.html"

[styling]
stylesheets = ["styles/book.css", "styles/pygments.css"]

[fonts]
include = []
rewrite_katex_to_woff2_only = true

[math]
render = "katex"
node_exe = "node"
katex_path = "node_modules"
bundle_css = true

[images]
max_side = 1400
jpeg_quality = 82
compress_pngs = true

[cover]
path = "images/book-cover.jpg"

[transforms]
wide_table_min_cols = 6
slim_index_lists = true
drop_inline_style_over = 1500
drop_selectors = [
    ".no-epub",
    "script[src*='analytics']",
    "script[src*='gtag']",
    "script[src*='pagefind']",
    "link[href*='pagefind']",
    "script[src*='book.js']",
    ".header-nav",
    ".header-search",
    ".page-breadcrumb",
    "a.skip-link",
    "script[src*='googletagmanager']",
]

[output]
epub = "KDP/output/DiscoveryAI.epub"

[optimize]
repair_entities = true
